<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="25%" style="stop-color:#FFD700"/>
      <stop offset="25%" style="stop-color:#4CAF50"/>
      <stop offset="50%" style="stop-color:#4CAF50"/>
      <stop offset="50%" style="stop-color:#2196F3"/>
      <stop offset="75%" style="stop-color:#2196F3"/>
      <stop offset="75%" style="stop-color:#f44336"/>
      <stop offset="100%" style="stop-color:#f44336"/>
    </linearGradient>
  </defs>
  <!-- Outer ring with gradient -->
  <circle cx="50" cy="50" r="45" fill="url(#bgGrad)"/>
  <!-- Inner dark circle -->
  <circle cx="50" cy="50" r="36" fill="#1E1E1E"/>
  <!-- Dollar sign -->
  <text x="50" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="45" font-weight="bold" fill="white">$</text>
  <!-- Green border ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#4CAF50" stroke-width="4"/>
</svg>
